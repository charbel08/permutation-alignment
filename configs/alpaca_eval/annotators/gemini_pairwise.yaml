gemini_pairwise:
  prompt_template: "chatgpt/basic_prompt.txt"
  fn_completions: "google_completions"
  completions_kwargs:
    model_name: "gemini-2.5-flash"
    max_output_tokens: 50
    temperature: 0
    num_procs: 1
  fn_completion_parser: "regex_parser"
  completion_parser_kwargs:
    outputs_to_match:
      1: '(?:^|\\n) ?Output \(a\)'
      2: '(?:^|\\n) ?Output \(b\)'
  batch_size: 1
