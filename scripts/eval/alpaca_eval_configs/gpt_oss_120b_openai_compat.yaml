gpt_oss_120b_openai_compat:
  prompt_template: "chatgpt/basic_prompt.txt"
  fn_completions: "openai_completions"
  completions_kwargs:
    model_name: "gpt-oss-120b"
    max_tokens: 64
    temperature: 0.0
  completion_parser_kwargs:
    outputs_to_match:
      1: "(?:^|\\n) ?Output \\(a\\)"
      2: "(?:^|\\n) ?Output \\(b\\)"
  batch_size: 1
